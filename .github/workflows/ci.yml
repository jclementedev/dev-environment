name: ci

on:
  pull_request:
  push:
    branches: [main]

# Permisos mínimos: solo lectura del contenido del repositorio.
# Ningún job escribe en el repositorio ni necesita credenciales de GitHub.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-26.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: instalar bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: instalar chezmoi
        run: |
          bash bootstrap/chezmoi.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: ejecutar bats
        run: bats tests/

      - name: validar templates de chezmoi
        run: bash tests/verify-chezmoi-templates.sh

  scan:
    runs-on: ubuntu-26.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error

      # Gitleaks: versión y SHA256 fijados.
      # Procedimiento de actualización en docs/security.md.
      - name: gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_TARBALL_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail

          echo "Instalando gitleaks ${GITLEAKS_VERSION}"

          TARBALL_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"

          curl -sSfL "$TARBALL_URL" -o /tmp/gitleaks.tar.gz

          ACTUAL_SHA=$(sha256sum /tmp/gitleaks.tar.gz | awk '{print $1}')

          if [ "$ACTUAL_SHA" != "${GITLEAKS_TARBALL_SHA256}" ]; then
            echo "FALLO: gitleaks: discrepancia SHA256 (esperado=${GITLEAKS_TARBALL_SHA256} actual=$ACTUAL_SHA)" >&2
            exit 1
          fi

          tar -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

          gitleaks version
          gitleaks detect --redact --exit-code 2 --source . --verbose
